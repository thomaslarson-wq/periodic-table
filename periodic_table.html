<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Periodic Table</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #fff; color: #111; }
#pt-wrap { padding: 1rem 0.5rem 2rem; }
#controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 1rem; }
#search { flex: 1; min-width: 140px; max-width: 240px; padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; }
select { font-size: 13px; padding: 4px 8px; border: 1px solid #ccc; border-radius: 6px; }
#grid { display: grid; grid-template-columns: repeat(18, minmax(0, 1fr)); gap: 2px; }
.cell { aspect-ratio: 1; border-radius: 3px; cursor: pointer; border: 0.5px solid transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.1s, opacity 0.2s; position: relative; }
.cell:hover { transform: scale(1.15); z-index: 10; border-color: #999; }
.cell.dimmed { opacity: 0.15; }
.cell .num { font-size: 7px; opacity: 0.7; line-height: 1; }
.cell .sym { font-size: 13px; font-weight: 500; line-height: 1.1; }
.cell .name { font-size: 5.5px; opacity: 0.75; line-height: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; text-align: center; padding: 0 1px; }
.spacer { aspect-ratio: 1; }
#panel { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 1.25rem; margin-top: 1rem; display: none; }
#panel.visible { display: block; }
#panel-header { display: flex; align-items: center; gap: 16px; margin-bottom: 12px; }
#panel-symbol { font-size: 48px; font-weight: 500; line-height: 1; }
#panel-cat { font-size: 12px; padding: 2px 8px; border-radius: 6px; display: inline-block; margin-top: 4px; }
#panel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; margin-top: 12px; }
.stat { background: #f5f5f3; border-radius: 6px; padding: 8px 12px; }
.stat-label { font-size: 11px; color: #666; margin-bottom: 2px; }
.stat-value { font-size: 15px; font-weight: 500; }
.legend { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 0.75rem; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
#close-btn { margin-left: auto; background: transparent; border: 1px solid #ccc; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 12px; color: #666; }
#close-btn:hover { background: #f0f0f0; }
</style>
</head>
<body>
<div id="pt-wrap">
  <div id="controls">
    <input id="search" type="text" placeholder="Search element or symbol..." />
    <select id="prop-sel">
      <option value="">Color by: Category</option>
      <option value="period">Color by: Period</option>
      <option value="group">Color by: Group</option>
      <option value="state">Color by: State at RT</option>
      <option value="radioactive">Highlight: Radioactive</option>
    </select>
  </div>
  <div id="grid"></div>
  <div class="legend" id="legend"></div>
  <div id="panel">
    <div id="panel-header">
      <div id="panel-symbol"></div>
      <div>
        <div id="panel-name" style="font-size:22px;font-weight:500;"></div>
        <div id="panel-num"></div>
        <div id="panel-cat"></div>
      </div>
      <button id="close-btn">✕ close</button>
    </div>
    <div id="panel-grid"></div>
  </div>
</div>

const lanthanides = [57,58,59,60,61,62,63,64,65,66,67,68,69,70,71];
const actinides   = [89,90,91,92,93,94,95,96,97,98,99,100,101,102,103];

function getColor(el, mode) {
  if (!el) return { bg:'transparent', text:'#111', border:'transparent' };
  if (mode === '') return CAT_COLORS[el.cat] || CAT_COLORS["transition metal"];
  if (mode === 'period') { const c = PERIOD_COLORS[(el.period-1)%PERIOD_COLORS.length]; return {bg:c,text:'#333',border:c}; }
  if (mode === 'group') { if (!el.group) return {bg:'#F1EFE8',text:'#5F5E5A',border:'#B4B2A9'}; const c = PERIOD_COLORS[(el.group-1)%PERIOD_COLORS.length]; return {bg:c,text:'#333',border:c}; }
  if (mode === 'state') { const c = STATE_COLORS[el.state]||STATE_COLORS.unknown; return {bg:c,text:'#333',border:c}; }
  if (mode === 'radioactive') return el.radioactive ? {bg:'#FCEBEB',text:'#A32D2D',border:'#F09595'} : {bg:'#F1EFE8',text:'#5F5E5A',border:'#B4B2A9'};
  return CAT_COLORS[el.cat] || CAT_COLORS["transition metal"];
}

let activeFilter = '', searchVal = '';

function makeCell(el) {
  const div = document.createElement('div');
  div.className = 'cell';
  div.dataset.n = el.n;
  const c = getColor(el, activeFilter);
  div.style.background = c.bg;
  div.style.color = c.text;
  div.style.borderColor = c.border;
  div.innerHTML = `<span class="num">${el.n}</span><span class="sym">${el.sym}</span><span class="name">${el.name}</span>`;
  div.addEventListener('click', () => showPanel(el));
  return div;
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  layout.forEach(row => {
    row.forEach(n => {
      if (n === 0 || n === -1 || n === -2) { const s=document.createElement('div'); s.className='spacer'; grid.appendChild(s); return; }
      const el = byNumber[n];
      if (el) grid.appendChild(makeCell(el));
    });
  });
  const gap = document.createElement('div'); gap.style.gridColumn='1/span 18'; gap.style.height='6px'; grid.appendChild(gap);
  ['lanthanide','actinide'].forEach((type, ti) => {
    const arr = ti === 0 ? lanthanides : actinides;
    const row = document.createElement('div');
    row.style.cssText = 'grid-column:1/span 18;display:grid;grid-template-columns:repeat(18,minmax(0,1fr));gap:2px;';
    const s = document.createElement('div'); s.className='spacer'; s.style.gridColumn='1/3'; row.appendChild(s);
    const lbl = document.createElement('div'); lbl.style.cssText='display:flex;align-items:center;justify-content:center;font-size:8px;color:#999;aspect-ratio:1;';
    lbl.textContent = ti===0 ? '57-71' : '89-103'; row.appendChild(lbl);
    arr.forEach(n => row.appendChild(makeCell(byNumber[n])));
    grid.appendChild(row);
  });
  applySearch();
}

function applySearch() {
  const q = searchVal.toLowerCase().trim();
  document.querySelectorAll('.cell').forEach(cell => {
    const el = byNumber[parseInt(cell.dataset.n)];
    if (!el) return;
    if (!q) { cell.classList.remove('dimmed'); return; }
    const match = el.name.toLowerCase().includes(q) || el.sym.toLowerCase().includes(q) || String(el.n)===q || (el.cat&&el.cat.toLowerCase().includes(q));
    cell.classList.toggle('dimmed', !match);
  });
}

function buildLegend() {
  const leg = document.getElementById('legend');
  leg.innerHTML = '';
  const mode = activeFilter;
  let entries = [];
  if (mode===''||mode==='radioactive') {
    entries = mode==='radioactive' ? [{label:'radioactive',color:'#FCEBEB'},{label:'stable',color:'#F1EFE8'}] : Object.entries(CAT_COLORS).map(([k,v])=>({label:k,color:v.bg}));
  } else if (mode==='state') {
    entries = Object.entries(STATE_COLORS).map(([k,v])=>({label:k,color:v}));
  } else if (mode==='period') {
    entries = [1,2,3,4,5,6,7].map((p,i)=>({label:'period '+p,color:PERIOD_COLORS[i]}));
  } else if (mode==='group') {
    entries = [{label:'group 1-2',color:PERIOD_COLORS[0]},{label:'d-block',color:PERIOD_COLORS[2]},{label:'p-block',color:PERIOD_COLORS[4]}];
  }
  entries.forEach(e => {
    const item = document.createElement('div'); item.className='leg-item';
    item.innerHTML = `<div class="leg-dot" style="background:${e.color};"></div><span>${e.label}</span>`;
    leg.appendChild(item);
  });
}

function showPanel(el) {
  const c = getColor(el, '');
  document.getElementById('panel-symbol').textContent = el.sym;
  document.getElementById('panel-symbol').style.color = c.text;
  document.getElementById('panel-name').textContent = el.name;
  document.getElementById('panel-num').innerHTML = `<span style="font-size:13px;color:#666;">Atomic number: ${el.n}</span>`;
  const catEl = document.getElementById('panel-cat');
  catEl.textContent = el.cat;
  catEl.style.background = c.bg;
  catEl.style.color = c.text;
  const pg = document.getElementById('panel-grid');
  pg.innerHTML = '';
  const stats = [
    ['Atomic mass', el.mass ? el.mass + ' u' : '—'],
    ['Electron config', el.config],
    ['Period', el.period],
    ['Group', el.group || '—'],
    ['State at RT', el.state],
    ['Melting point', el.mp != null ? el.mp + ' °C' : '—'],
    ['Boiling point', el.bp != null ? el.bp + ' °C' : '—'],
    ['Density', el.density != null ? el.density + ' g/cm³' : '—'],
    ['Discovery', el.discovery || 'ancient'],
    ['Radioactive', el.radioactive ? 'yes' : 'no'],
  ];
  stats.forEach(([label, val]) => {
    const s = document.createElement('div'); s.className = 'stat';
    s.innerHTML = `<div class="stat-label">${label}</div><div class="stat-value">${val}</div>`;
    pg.appendChild(s);
  });
  if (el.desc) {
    const d = document.createElement('div');
    d.style.cssText = 'margin-top:10px;font-size:13px;color:#666;line-height:1.6;grid-column:1/-1;';
    d.textContent = el.desc;
    pg.appendChild(d);
  }
  document.getElementById('panel').classList.add('visible');
}

document.getElementById('close-btn').addEventListener('click', () => document.getElementById('panel').classList.remove('visible'));
document.getElementById('search').addEventListener('input', e => { searchVal = e.target.value; applySearch(); });
document.getElementById('prop-sel').addEventListener('change', e => { activeFilter = e.target.value; buildGrid(); buildLegend(); });

buildGrid();
buildLegend();
</script>
</body>
</html>
